<!DOCTYPE html>
<html lang='pt-BR'>

<head>
    <meta charset='utf-8'>
    <title>Contrato</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Georgia, serif;
            background-color: #9090f5;
            color: #333;
            line-height: 1.6;
            padding: 40px;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: #444;
        }

        .destaque {
            font-weight: bold;
            color: #222;
        }

        .info {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Contrato Concessionária Dream</h2>
        <p><span class="destaque">Nome do cliente:</span> Ane</p>
        <div class="info">
            <p><span class="destaque">Informações do carro:</span><br>Modelo: Fiat Uno<br>Ano: 2020<br>Cor:
                Branco<br>Preço: R$35000.00<br></p>
            <p><span class="destaque">Parcelas:</span> 888.89</p>
            <p><span class="destaque">Tipo de pagamento:</span> Boleto</p>
        </div>
    </div>
</body>

</html>
